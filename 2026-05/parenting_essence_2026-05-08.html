/* ════════════════════════════════════════════════════════

/* 1. Hero 結構（不指定背景圖，由文章本身設定） */
.head{
  min-height:70vh !important;

  top:24px !important;left:28px !important;
}
.head::after{
  font-size:11px !important;
  letter-spacing:3px !important;
  top:24px !important;right:28px !important;

}

/* 2. Hero 進場動畫 + Ken Burns */
.head .tag{opacity:0;animation:heroFade .9s ease .15s forwards;}
.head h1{opacity:0;transform:translateY(24px);animation:heroSlideUp 1.1s cubic-bezier(.2,.7,.2,1) .25s forwards;}
.head .meta{opacity:0;animation:heroFade 1.0s ease .55s forwards;}
.head .hook{opacity:0;animation:heroFade 1.0s ease .8s forwards;}
.head::after{opacity:0;animation:heroFade .9s ease 1.0s forwards;}
@keyframes heroSlideUp{to{opacity:1;transform:translateY(0);}}
@keyframes heroFade{to{opacity:1;}}

.head::before{
  content:'' !important;display:block !important;
  position:absolute !important;inset:0 !important;
  background:inherit !important;
  background-size:cover !important;
  background-position:center !important;
  z-index:0 !important;
  animation:kenBurns 26s ease-in-out infinite alternate;
  pointer-events:none;
}
.head > *{position:relative;z-index:1;}
@keyframes kenBurns{
  0%{transform:scale(1) translate(0,0);}
  100%{transform:scale(1.07) translate(-1.5%, -1%);}
}

/* 3. 文章主體：軟邊 + 縮一級 */
.body{

  margin:8px 0 8px;
  font-size:17px;
  color:var(--brand-deep);
  font-weight:700;
}
.step-card p{
  margin:0 0 10px;
  font-size:15.5px;
  color:var(--ink-soft);
  line-height:1.85;
}
.step-card .say{
  background:#fbf3e2;
  border-left:3px solid var(--accent);
  padding:11px 14px;
  border-radius:8px;
  font-size:14.5px;
  color:#6f5a35;
  margin-top:8px;
  line-height:1.8;
}
.check{
  background:#fff;
  border:1px dashed var(--accent);
  border-radius:14px;
  padding:18px 20px;
  margin-top:22px;
}
.check h3{
  margin:0 0 10px;
  font-size:16px;
  color:var(--brand-deep);
}
.check ol{
  margin:0;
  padding-left:22px;
  font-size:15px;
  color:var(--ink-soft);
  line-height:1.85;
}
.check li{margin-bottom:6px}
.outro{
  background:linear-gradient(135deg,#d8b87a 0%,var(--accent) 100%);
  color:#3a2e10;
  border-radius:18px;
  padding:28px 26px;
  margin-top:22px;
  text-align:center;
}
.outro p{
  margin:0 0 12px;
  font-size:16px;
  line-height:1.9;
  color:#3a2e10;
}
.outro .sign{
  font-size:14px;
  margin-top:14px;
  letter-spacing:1.5px;
  font-weight:600;
  color:#4a3a15;
}
.spectrum{
  margin-top:22px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
  padding:28px 24px 24px;
}
.spectrum > h2{
  font-size:19px;
  color:var(--brand-deep);
  border-left:4px solid var(--accent);
  padding-left:12px;
  margin:0 0 6px;
  font-weight:700;
  letter-spacing:0.3px;
}
.spectrum .sub{
  font-size:14px;
  color:var(--ink-soft);
  margin:0 0 18px;
  line-height:1.8;
}
.spec-mini-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:6px 0 16px;
}
.spec-mini{
  flex:1 1 calc(50% - 8px);
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  border-radius:10px;
  font-size:14px;
  font-weight:600;
  color:var(--ink);
}
.spec-mini .dot{
  width:10px;
  height:10px;
  border-radius:50%;
  flex-shrink:0;
}
.spec-mini .type-mini{
  font-size:12.5px;
  color:var(--ink-soft);
  font-weight:500;
  margin-left:4px;
}
.spec-mini.red{background:#fff2ee;border:1px solid #f3c5b3}
.spec-mini.red .dot{background:#e85d3a}
.spec-mini.orange{background:#fdf1e0;border:1px solid #eccfa1}
.spec-mini.orange .dot{background:#e89a3a}
.spec-mini.green{background:#eef6ed;border:1px solid #bcd9b8}
.spec-mini.green .dot{background:#5aa551}
.spec-mini.blue{background:#eaf0f9;border:1px solid #c3d0e5}
.spec-mini.blue .dot{background:#2c4373}
.spec-takeaway{
  background:#fbf3e2;
  border-left:3px solid var(--accent);
  border-radius:8px;
  padding:12px 14px;
  margin-top:6px;
  font-size:14px;
  color:#6f5a35;
  line-height:1.85;
}
.spec-cta{
  margin-top:18px;
  text-align:center;
  padding:16px 14px 14px;
  background:linear-gradient(135deg,#f1ecdb 0%,#fbf3e2 100%);
  border-radius:12px;
  border:1px dashed var(--accent);
}
.spec-cta .lead{
  font-size:14.5px;
  color:var(--ink);
  margin:0 0 10px;
  font-weight:600;
}
.spec-cta .cta-btn{
  display:inline-block;
  background:var(--brand);
  color:#fff;
  text-decoration:none;
  padding:10px 22px;
  border-radius:24px;
  font-size:15px;
  font-weight:700;
  letter-spacing:0.5px;
  box-shadow:0 3px 10px rgba(44,67,115,0.25);
  transition:transform .2s, box-shadow .2s;
}
.spec-cta .cta-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 5px 14px rgba(44,67,115,0.32);
}
.spec-cta .sub-link{
  margin-top:10px;
  font-size:12.5px;
  color:var(--ink-soft);
}
.spec-cta .sub-link a{color:var(--brand);text-decoration:none}
.spec-cta .sub-link a:hover{text-decoration:underline}
@media(max-width:600px){
  .spec-mini{flex:1 1 calc(50% - 6px);font-size:13px}
  .spec-mini .type-mini{display:none}
}
.foot{
  margin-top:26px;
  padding:22px 22px 24px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  font-size:13px;
  color:var(--ink-soft);
  line-height:1.85;
}
.foot strong{color:var(--brand-deep)}
.foot .tagline{
  margin-top:14px;
  padding-top:12px;
  border-top:1px solid var(--border);
  color:var(--brand);
  font-weight:600;
  letter-spacing:1px;
  text-align:center;
}
@media(max-width:600px){
  .wrap{padding:18px 14px 70px}
  .head{padding:26px 22px 24px}
  .head h1{font-size:22px}
  .body{padding:26px 20px 22px}
  .body h2{font-size:17px}
  .body p{font-size:15.5px}
  .steps{padding:22px 16px}
  .step-card{padding:18px 16px 16px}
  .step-card h3{font-size:16px}
}
/* OPT_ENHANCE_2026_05_13 */
html { scroll-behavior: smooth; }
body { -webkit-tap-highlight-color: transparent; text-rendering: optimizeLegibility; }
:focus-visible { outline: 2.5px solid currentColor; outline-offset: 3px; border-radius: 6px; }
a, button, .copy-btn, .cta-btn, .filter-chip { min-height: 36px; }
.topbar { padding-top: calc(14px + env(safe-area-inset-top, 0px)) !important; }
.wrap { padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px)) !important; }
img, svg.ornament { max-width: 100%; height: auto; }
@media (max-width: 480px) {
  body { font-size: 15.5px; }
  .body p, .card .body p { font-size: 15px; line-height: 1.85; }
  .head h1 { letter-spacing: 0.2px; }
  .head .hook { font-size: 15px; line-height: 1.85; }
  .card { padding: 14px 14px 12px; }
  .card h3 { font-size: 15.5px; line-height: 1.5; }
  .card .body p { font-size: 14.5px; }
  .action { font-size: 13.5px; padding: 11px 12px; }
  .meta { font-size: 11.5px; }
  .copy-btn { font-size: 11.5px; padding: 4px 12px; }
  .step-card { margin-top: 18px; }
  .step-card .num { left: 14px; top: -14px; }
  .outro { padding: 22px 18px; }
  .outro p { font-size: 15px; line-height: 1.85; }
  .spectrum { padding: 22px 16px 20px; }
  .spectrum > h2 { font-size: 17px; }
  .spec-mini { padding: 9px 10px; font-size: 13.5px; }
}
@media print {
  .topbar, .copy-btn, footer .nav, .spec-cta { display: none !important; }
  body { background: #fff !important; }
  .card, article.body, .head, .step-card { box-shadow: none !important; break-inside: avoid; }
  a { color: inherit; text-decoration: none; }
}

/* ════════════════════════════════════════════════════════
   知性溫潤｜內頁視覺重設計
   ════════════════════════════════════════════════════════ */
:root{
  --serif:"Noto Serif TC","Songti TC","PingFang TC","Microsoft JhengHei",serif;
  --sans:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
}
body{
  font-family:var(--sans);
  background:
    radial-gradient(900px 500px at 0% 0%, rgba(160,132,86,0.07), transparent 60%),
    radial-gradient(1000px 600px at 100% 100%, rgba(44,67,115,0.05), transparent 60%),
    var(--bg);
}

/* ── Hero：印章式日期戳 + 大套件引言 ── */
.head{
  background:linear-gradient(135deg,var(--brand-deep) 0%,var(--brand) 65%,#3b5586 100%);
  box-shadow:0 16px 40px rgba(31,49,88,0.22);
  border-radius:22px;
  padding:46px 32px 38px;
  border:1px solid rgba(255,255,255,0.08);
  position:relative;
  overflow:hidden;
}
.head::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    repeating-linear-gradient(0deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 4px);
  opacity:.6;
}
.head .ornament{opacity:.12;}

.head .meta{position:relative;z-index:2;}
.head .meta .datebadge{
  font-family:var(--serif);
  font-size:13px;letter-spacing:4px;font-weight:900;
  background:rgba(255,253,246,0.95);
  color:var(--accent-deep);
  padding:7px 12px 6px;border-radius:4px;
  border:2px solid rgba(255,247,225,0.4);
  box-shadow:inset 0 0 0 1px rgba(123,99,55,0.35);
  transform:rotate(-3deg);
  display:inline-block;
}
.head .meta .age{
  background:rgba(160,132,86,0.32);
  color:#fff7e1;font-family:var(--serif);
  font-weight:600;letter-spacing:1px;
}

.head .tag{
  font-family:var(--serif);font-weight:700;
  letter-spacing:5px;font-size:13px;
  background:rgba(255,253,246,0.16);
  color:#fff7e1;
  border:1px solid rgba(255,255,255,0.22);
  margin-bottom:22px;
}
.head h1{
  font-family:var(--serif);
  font-size:30px;line-height:1.55;
  font-weight:900;letter-spacing:0.6px;
  color:#fff;
  margin:0 0 22px;
}
.head .hook{
  font-family:var(--sans);
  background:rgba(0,0,0,0.18);
  border:none;
  border-left:3px solid var(--accent);
  padding:22px 22px 22px 36px;
  font-size:15.5px;
  line-height:2;
  color:#fbf3df;
  position:relative;
  border-radius:0 12px 12px 0;
  font-feature-settings:"palt" 1;
}
.head .hook::before{
  content:'\201C';
  position:absolute;left:12px;top:-2px;
  font-family:var(--serif);font-size:54px;
  color:rgba(160,132,86,0.7);
  line-height:1;font-weight:900;
}

/* ── Body Article：標題襯線 + 段落書卷感 ── */
.body{
  background:linear-gradient(180deg,#ffffff 0%,#fefcf6 100%);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:0 4px 18px rgba(60,55,40,0.06);
  padding:42px 36px 34px;
}
.body h2{
  font-family:var(--serif);
  font-size:20px;font-weight:700;
  color:var(--brand-deep);
  letter-spacing:0.5px;
  border-left:none;
  padding-left:0;
  position:relative;
  padding-bottom:10px;
  margin:0 0 18px;
}
.body h2::before{
  content:'§ ';
  font-family:var(--serif);
  color:var(--accent);
  font-weight:900;
  margin-right:6px;
}
.body h2::after{
  content:'';position:absolute;left:0;bottom:0;
  width:48px;height:2px;
  background:var(--accent);
}
.body p{
  font-family:var(--sans);
  font-size:16px;line-height:2;
  color:var(--ink);
  text-align:justify;
  font-feature-settings:"palt" 1;
}
.body section:first-of-type p:first-of-type:first-letter{
  font-family:var(--serif);
  font-size:2.6em;float:left;
  line-height:0.95;
  padding:6px 8px 0 0;
  color:var(--brand-deep);
  font-weight:900;
}

/* ── Steps ── */
.steps{
  background:linear-gradient(180deg,#fdf9f0 0%,#f9f1de 100%);
  border:1px solid var(--border);
  border-radius:18px;
}
.steps h2{
  font-family:var(--serif);color:var(--brand-deep);
  letter-spacing:0.5px;
  border-left:none;padding-left:0;position:relative;padding-bottom:10px;
}
.steps h2::before{content:'§ ';color:var(--accent);font-weight:900;}
.steps h2::after{
  content:'';position:absolute;left:0;bottom:0;width:48px;height:2px;background:var(--accent);
}
.step-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:12px;
  box-shadow:0 2px 8px rgba(123,99,55,0.06);
}
.step-card .num{
  background:var(--brand-deep);
  font-family:var(--serif);font-weight:900;
  box-shadow:0 4px 12px rgba(31,49,88,0.35);
  width:34px;height:34px;
  font-size:16px;
}
.step-card h3{
  font-family:var(--serif);
  color:var(--brand-deep);
  font-weight:700;
  letter-spacing:0.4px;
}
.step-card .say{
  font-family:var(--sans);
  background:linear-gradient(180deg,#fbf3e2 0%,#f8ecd0 100%);
  border-left:3px solid var(--accent);
  font-style:italic;
}

/* ── 自我覺察清單 ── */
.check{
  background:#fffaef;
  border:1px dashed var(--accent);
}
.check h3{font-family:var(--serif);color:var(--brand-deep);}

/* ── Outro：感謝信箋 ── */
.outro{
  background:linear-gradient(135deg,#cdb47c 0%,var(--accent) 60%,#8a6e3f 100%);
  color:#2a2010;
  border-radius:18px;
  position:relative;

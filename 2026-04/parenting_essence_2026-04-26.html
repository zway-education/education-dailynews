/* 2. Hero 進場動畫 + Ken Burns */
.head .tag{opacity:0;animation:heroFade .9s ease .15s forwards;}

.head .hook{opacity:0;animation:heroFade 1.0s ease .8s forwards;}

@keyframes heroSlideUp{to{opacity:1;transform:translateY(0);}}
@keyframes heroFade{to{opacity:1;}}

.head::before{
  content:'' !important;display:block !important;
  position:absolute !important;inset:0 !important;
  background:inherit !important;

  background-position:center !important;
  z-index:0 !important;
  animation:kenBurns 26s ease-in-out infinite alternate;
  pointer-events:none;
}
.head > *{position:relative;z-index:1;}

}

.head .ornament{
  position:absolute;
  right:-30px;
  top:-30px;
  width:160px;
  height:160px;
  opacity:0.18;
}
.body{
  background:var(--card);
  border-radius:18px;
  padding:36px 32px 30px;
  margin-top:22px;
  box-shadow:0 4px 18px rgba(60,55,40,0.06);
  border:1px solid var(--border);
}
.body section{margin-bottom:30px}
.body section:last-child{margin-bottom:0}
.body h2{
  font-size:19px;
  color:var(--brand-deep);
  border-left:4px solid var(--accent);
  padding-left:12px;
  margin:0 0 14px;
  font-weight:700;
  letter-spacing:0.3px;
}
.body p{
  margin:0 0 14px;
  font-size:16px;
  color:var(--ink);
}
.body p:last-child{margin-bottom:0}
.steps{
  background:#fdf9f0;
  border:1px solid var(--border);
  border-radius:18px;
  padding:28px 24px;
  margin-top:22px;
}
.steps h2{
  font-size:19px;
  color:var(--brand-deep);
  border-left:4px solid var(--accent);
  padding-left:12px;
  margin:0 0 18px;
  font-weight:700;
}
.step-card{
  background:#fff;
  border-radius:14px;
  padding:20px 20px 18px;
  margin-bottom:16px;
  border:1px solid var(--border);
  position:relative;
}
.step-card:last-child{margin-bottom:0}
.step-card .num{
  position:absolute;
  top:-12px;
  left:18px;
  width:32px;
  height:32px;
  background:var(--brand);
  color:#fff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:15px;
  box-shadow:0 4px 10px rgba(44,67,115,0.3);
}
.step-card h3{
  margin:8px 0 8px;
  font-size:17px;
  color:var(--brand-deep);
  font-weight:700;
}
.step-card p{
  margin:0 0 10px;
  font-size:15.5px;
  color:var(--ink-soft);
  line-height:1.85;
}
.step-card .say{
  background:#fbf3e2;
  border-left:3px solid var(--accent);
  padding:11px 14px;
  border-radius:8px;
  font-size:14.5px;
  color:#6f5a35;
  margin-top:8px;
  line-height:1.8;
}
.check{
  background:#fff;
  border:1px dashed var(--accent);
  border-radius:14px;
  padding:18px 20px;
  margin-top:22px;
}
.check h3{
  margin:0 0 10px;
  font-size:16px;
  color:var(--brand-deep);
}
.check ol{
  margin:0;
  padding-left:22px;
  font-size:15px;
  color:var(--ink-soft);
  line-height:1.85;
}
.check li{margin-bottom:6px}
.outro{
  background:linear-gradient(135deg,#d8b87a 0%,var(--accent) 100%);
  color:#3a2e10;
  border-radius:18px;
  padding:28px 26px;
  margin-top:22px;
  text-align:center;
}
.outro p{
  margin:0 0 12px;
  font-size:16px;
  line-height:1.9;
  color:#3a2e10;
}
.outro .sign{
  font-size:14px;
  margin-top:14px;
  letter-spacing:1.5px;
  font-weight:600;
  color:#4a3a15;
}
.spectrum{
  margin-top:22px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
  padding:28px 24px 24px;
}
.spectrum > h2{
  font-size:19px;
  color:var(--brand-deep);
  border-left:4px solid var(--accent);
  padding-left:12px;
  margin:0 0 6px;
  font-weight:700;
  letter-spacing:0.3px;
}
.spectrum .sub{
  font-size:14px;
  color:var(--ink-soft);
  margin:0 0 18px;
  line-height:1.8;
}
.spec-mini-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:6px 0 16px;
}
.spec-mini{
  flex:1 1 calc(50% - 8px);
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  border-radius:10px;
  font-size:14px;
  font-weight:600;
  color:var(--ink);
}
.spec-mini .dot{
  width:10px;
  height:10px;
  border-radius:50%;
  flex-shrink:0;
}
.spec-mini .type-mini{
  font-size:12.5px;
  color:var(--ink-soft);
  font-weight:500;
  margin-left:4px;
}
.spec-mini.red{background:#fff2ee;border:1px solid #f3c5b3}
.spec-mini.red .dot{background:#e85d3a}
.spec-mini.orange{background:#fdf1e0;border:1px solid #eccfa1}
.spec-mini.orange .dot{background:#e89a3a}
.spec-mini.green{background:#eef6ed;border:1px solid #bcd9b8}
.spec-mini.green .dot{background:#5aa551}
.spec-mini.blue{background:#eaf0f9;border:1px solid #c3d0e5}
.spec-mini.blue .dot{background:#2c4373}
.spec-takeaway{
  background:#fbf3e2;
  border-left:3px solid var(--accent);
  border-radius:8px;
  padding:12px 14px;
  margin-top:6px;
  font-size:14px;
  color:#6f5a35;
  line-height:1.85;
}
.spec-cta{
  margin-top:18px;
  text-align:center;
  padding:16px 14px 14px;
  background:linear-gradient(135deg,#f1ecdb 0%,#fbf3e2 100%);
  border-radius:12px;
  border:1px dashed var(--accent);
}
.spec-cta .lead{
  font-size:14.5px;
  color:var(--ink);
  margin:0 0 10px;
  font-weight:600;
}
.spec-cta .cta-btn{
  display:inline-block;
  background:var(--brand);
  color:#fff;
  text-decoration:none;
  padding:10px 22px;
  border-radius:24px;
  font-size:15px;
  font-weight:700;
  letter-spacing:0.5px;
  box-shadow:0 3px 10px rgba(44,67,115,0.25);
  transition:transform .2s, box-shadow .2s;
}
.spec-cta .cta-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 5px 14px rgba(44,67,115,0.32);
}
.spec-cta .sub-link{
  margin-top:10px;
  font-size:12.5px;
  color:var(--ink-soft);
}
.spec-cta .sub-link a{color:var(--brand);text-decoration:none}
.spec-cta .sub-link a:hover{text-decoration:underline}
@media(max-width:600px){
  .spec-mini{flex:1 1 calc(50% - 6px);font-size:13px}
  .spec-mini .type-mini{display:none}
}
.foot{
  margin-top:26px;
  padding:22px 22px 24px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  font-size:13px;
  color:var(--ink-soft);
  line-height:1.85;
}
.foot strong{color:var(--brand-deep)}
.foot .tagline{
  margin-top:14px;
  padding-top:12px;
  border-top:1px solid var(--border);
  color:var(--brand);
  font-weight:600;
  letter-spacing:1px;
  text-align:center;
}
@media(max-width:600px){
  .wrap{padding:18px 14px 70px}
  .head{padding:26px 22px 24px}
  .head h1{font-size:22px}
  .body{padding:26px 20px 22px}
  .body h2{font-size:17px}
  .body p{font-size:15.5px}
  .steps{padding:22px 16px}
  .step-card{padding:18px 16px 16px}
  .step-card h3{font-size:16px}
}
/* OPT_ENHANCE_2026_05_13 */
html { scroll-behavior: smooth; }
body { -webkit-tap-highlight-color: transparent; text-rendering: optimizeLegibility; }
:focus-visible { outline: 2.5px solid currentColor; outline-offset: 3px; border-radius: 6px; }
a, button, .copy-btn, .cta-btn, .filter-chip { min-height: 36px; }
.topbar { padding-top: calc(14px + env(safe-area-inset-top, 0px)) !important; }
.wrap { padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px)) !important; }
img, svg.ornament { max-width: 100%; height: auto; }
@media (max-width: 480px) {
  body { font-size: 15.5px; }
  .body p, .card .body p { font-size: 15px; line-height: 1.85; }
  .head h1 { letter-spacing: 0.2px; }
  .head .hook { font-size: 15px; line-height: 1.85; }
  .card { padding: 14px 14px 12px; }
  .card h3 { font-size: 15.5px; line-height: 1.5; }
  .card .body p { font-size: 14.5px; }
  .action { font-size: 13.5px; padding: 11px 12px; }
  .meta { font-size: 11.5px; }
  .copy-btn { font-size: 11.5px; padding: 4px 12px; }
  .step-card { margin-top: 18px; }
  .step-card .num { left: 14px; top: -14px; }
  .outro { padding: 22px 18px; }
  .outro p { font-size: 15px; line-height: 1.85; }
  .spectrum { padding: 22px 16px 20px; }
  .spectrum > h2 { font-size: 17px; }
  .spec-mini { padding: 9px 10px; font-size: 13.5px; }
}
@media print {
  .topbar, .copy-btn, footer .nav, .spec-cta { display: none !important; }
  body { background: #fff !important; }
  .card, article.body, .head, .step-card { box-shadow: none !important; break-inside: avoid; }
  a { color: inherit; text-decoration: none; }
}
